name: Deploy Staging

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: inkwell-staging-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: depot-ubuntu-24.04
    environment:
      name: staging
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_STAGING_DEPLOY_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Convex codegen
        run: pnpm --filter @inkwell/backend codegen

      - name: Check types (all packages + mobile)
        run: pnpm typecheck

      - name: Run tests
        run: |
          pnpm --filter @inkwell/content test
          pnpm --filter @inkwell/api test

      - name: Validate mobile bundle
        working-directory: apps/mobile
        run: pnpm exec expo export --platform ios --output-dir /tmp/mobile-export

      - name: Deploy Convex (staging) and build web app
        working-directory: packages/backend
        env:
          CLOUDFLARE_ENV: dev
          VITE_CLERK_PUBLISHABLE_KEY: ${{ vars.VITE_CLERK_PUBLISHABLE_KEY_STAGING }}
          VITE_API_URL: https://inkwell-api-dev.davis-benjamin41902.workers.dev
        run: >
          pnpm exec convex deploy -y
          --cmd-url-env-var-name VITE_CONVEX_URL
          --cmd "cd ../.. && pnpm --filter inkwell-web build"

      - name: Deploy staging api Worker
        working-directory: apps/api
        run: pnpm exec wrangler deploy --env dev

      - name: Deploy staging web Worker
        working-directory: apps/web
        run: pnpm exec wrangler deploy
